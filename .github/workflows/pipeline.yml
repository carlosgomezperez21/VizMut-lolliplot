name: VizMut lolliplot pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install CRAN packages
        run: |
          install.packages(c(
            'optparse',
            'dplyr',
            'stringr',
            'ggplot2',
            'ggrepel',
            'RColorBrewer',
            'ggnewscale',
            'httr',
            'jsonlite',
            'xml2',
            'R.utils'
          ), repos = 'https://cloud.r-project.org')
        shell: Rscript {0}

      - name: Install Bioconductor packages
        run: |
          install.packages('BiocManager', repos = 'https://cloud.r-project.org')
          BiocManager::install(c('rtracklayer', 'GenomicRanges'), ask = FALSE)
        shell: Rscript {0}

      - name: Run pipeline - protein plot
        run: |
          Rscript main.R \
            --variants data/variant_kmt2b_toy.csv \
            --features data/features_kmt2b_toy.csv \
            --plot-type protein \
            --gene-name KMT2B \
            --protein-length 2715 \
            --output output/lolliplot_protein.png

      - name: Run pipeline - gene structure plot
        run: |
          Rscript main.R \
            --variants data/variant_kmt2b_toy.csv \
            --plot-type single_gene \
            --gene-name KMT2B \
            --transcript-id NM_014727.3 \
            --genome hg38 \
            --output output/lolliplot_gene.png

      - name: Upload plots
        uses: actions/upload-artifact@v4
        with:
          name: lolliplots
          path: |
            output/lolliplot_protein.png
            output/lolliplot_gene.png
