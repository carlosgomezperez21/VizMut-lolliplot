name: VizMut lolliplot pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R packages
        run: |
          install.packages(c(
            'optparse',
            'dplyr',
            'stringr',
            'ggplot2',
            'ggrepel',
            'RColorBrewer',
            'ggnewscale'
          ), repos = 'https://cloud.r-project.org')
        shell: Rscript {0}

      - name: Run pipeline
        run: |
          Rscript main.R \
            --variants data/variant_kmt2b_toy.csv \
            --features data/features_kmt2b_toy.csv \
            --gene KMT2B \
            --protein_length 2715 \
            --output output/lolliplot.png

      - name: Upload plot
        uses: actions/upload-artifact@v4
        with:
          name: lolliplot
          path: output/lolliplot.png
